backend = "glx";
vsync = true;
# Backend (βάλε glx αν έχεις GPU, αλλιώς xrender)
backend = "glx";

# VSync για να μην έχει tearing
vsync = true;

# Opacity (γενικό transparency control)
inactive-opacity = 0.75;
active-opacity = 1.0;

# Shadow (ωραίο αλλά λίγο performance hit)
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.3;
shadow-offset-x = -5;
shadow-offset-y = -5;

# Blur (αν το backend το υποστηρίζει καλά)
blur-method = "dual_kawase";
blur-strength = 5;

blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;

# Fading
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Round corners (αν υποστηρίζεται build σου)
corner-radius = 8;

# Performance tweaks
detect-rounded-corners = true;
detect-client-opacity = true;

# Rules (π.χ. να μην επηρεάζει terminals πολύ)
opacity-rule = [
  "90:class_g = 'Alacritty'",
  "95:class_g = 'XTerm'"
];

# Ignore stuff (fix flicker σε tooltips κλπ)
wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.9; };
  dropdown_menu = { shadow = false; };
  popup_menu = { shadow = false; };
};

blur-background-exclude = [
  "class_g = 'slop'",
  "class_i = 'slop'"
];

# 2. Prevent picom from trying to 'fade' the selection window in/out
fade-exclude = [
  "class_g = 'slop'"
];

# 3. (Optional) Prevent shadows on the selection box
shadow-exclude = [
  "class_g = 'slop'"
];
